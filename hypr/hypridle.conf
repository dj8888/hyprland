general {
    lock_cmd = notify-send "lock!"          # dbus/sysd lock command (loginctl lock-session)
    unlock_cmd = notify-send "unlock!"      # same as above, but unlock
    before_sleep_cmd = notify-send "Zzz"    # command ran before sleep
    after_sleep_cmd = notify-send "Awake!"  # command ran after sleep
    ignore_dbus_inhibit = false             # whether to ignore dbus-sent idle-inhibit requests (used by e.g. firefox or steam)
    ignore_systemd_inhibit = false          # whether to ignore systemd-inhibit --what=idle inhibitors
}

#Decrease Brightness
listener {
    timeout = 320
    # on-timeout = swayosd-client --brightness 5 & asusctl -k off & notify-send "You are idle!"
    on-timeout = ~/.config/hypr/scripts/brightness-idle.sh dim & notify-send "You are idle!"
    # set monitor backlight to minimum, avoid 0 on OLED monitor.
    # on-resume = swayosd-client --brightness 50 & asusctl -k high & notify-send "Welcome back!"
    on-resume = ~/.config/hypr/scripts/brightness-idle.sh restore & notify-send "Welcome back!"
    # monitor backlight restore.
    #user must be in the video and input groups for this to work.
}

listener {
    timeout = 600                            # 5min
    on-timeout = hyprlock                    # lock screen when timeout has passed
}

listener {
    timeout = 900                            # in seconds
    on-timeout = systemctl suspend
}
