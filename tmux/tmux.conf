# --- Material Ocean ---

# vim-material (oceanic) palette
# bg        #0F111A
# fg        #A6ACCD
# surface   #292D3E
# muted     #525975
# blue      #82AAFF
# cyan      #89DDFF
# red       #FF5370
# green     #C3E88D
# yellow    #FFCB6B
# orange    #F78C6C
# purple    #C792EA

# Basic status bar colors
set -g status-style 'bg=#000000 fg=#A6ACCD'

# Left side: Session name (using Color 4 blue)
set -g status-left '#[fg=#0F111A,bg=#82AAFF,bold] #S #[fg=#82AAFF,bg=#0F111A] '
set -g status-left-length 20

# Inactive windows: powerline segment (gray block) 
setw -g window-status-style 'fg=#A6ACCD bg=#292D3E'
setw -g window-status-format '#[fg=#A6ACCD,bg=#292D3E] #I:#W #[fg=#292D3E,bg=#0F111A]'

# Active window: powerline segment (blue block} 
setw -g window-status-current-style 'fg=#0F111A bg=#82AAFF bold'
setw -g window-status-current-format '#[fg=#0F111A,bg=#82AAFF,bold] #I:#W #[fg=#82AAFF,bg=#0F111A]'

# Pane borders (Color 8 for inactive, Color 4 for active)
set -g pane-border-style 'fg=#525975'
set -g pane-active-border-style 'fg=#89DDFF'

# Messaging and Copy Mode (Selection background)
set -g message-style 'fg=#0F111A bg=#82AAFF bold'
setw -g mode-style 'fg=#0F111A bg=#82AAFF bold'

# --- Right Side Status with Hostname ---
set -g status-right-length 100

# Format: [Hostname]  [Date]  [Time]
set -g status-right "#[fg=#525975,bg=#0F111A] #h #[fg=#82AAFF,bg=#0F111A] #[fg=#525975,bg=#0F111A] %Y-%m-%d #[fg=#82AAFF,bg=#0F111A] #[fg=#82AAFF,bg=#0F111A,bold]%H:%M "


set -ga terminal-overrides ",screen-256color*:Tc"
set-option -g default-terminal "screen-256color"
#set -s escape-time 0

#unbind C-b
#set-option -g prefix C-a
#bind-key C-a send-prefix
set -g status-style 'bg=#0F111A fg=#A6ACCD'

bind r source-file ~/.tmux.conf
set -g base-index 1


# Bind prefix + f to launch the sessionizer in a new tmux window
bind-key -r f run-shell "tmux neww tmux-sessionizer"
