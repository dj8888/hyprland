# --- Material Ocean ---

# kitty.conf palette (nord / material ocean)
# bg        #3B4252
# fg        #D8DEE9
# surface   #4C566A
# muted     #4C566A
# blue      #81A1C1
# cyan      #88C0D0
# red       #BF616A
# green     #A3BE8C
# yellow    #EBCB8B
# orange    #EBCB8B
# purple    #B48EAD

# Basic status bar colors
set -g status-style 'bg=#000000 fg=#000000'

# Left side: Session name (using Color 4 blue)
set -g status-left '#[fg=#3B4252,bg=#81A1C1,bold] #S #[fg=#81A1C1,bg=#000000] '
set -g status-left-length 20

# Inactive windows: powerline segment (gray block) 
setw -g window-status-style 'fg=#D8DEE9 bg=#4C566A'
setw -g window-status-format '#[fg=#D8DEE9,bg=#4C566A] #I:#W #[fg=#4C566A,bg=#3B4252]'

# Active window: powerline segment (blue block} 
setw -g window-status-current-style 'fg=#3B4252 bg=#81A1C1 bold'
setw -g window-status-current-format '#[fg=#3B4252,bg=#81A1C1,bold] #I:#W #[fg=#81A1C1,bg=#3B4252]'

# Pane borders (Color 8 for inactive, Color 4 for active)
set -g pane-border-style 'fg=#4C566A'
set -g pane-active-border-style 'fg=#88C0D0'

# Messaging and Copy Mode (Selection background)
set -g message-style 'fg=#3B4252 bg=#81A1C1 bold'
setw -g mode-style 'fg=#3B4252 bg=#81A1C1 bold'

# --- Right Side Status with Hostname ---
set -g status-right-length 100

# Format: [Hostname]  [Date]  [Time]
set -g status-right "#[fg=#D8DEE9,bg=#000000] #h #[fg=#81A1C1,bg=#000000] #[fg=#D8DEE9,bg=#000000] %Y-%m-%d #[fg=#81A1C1,bg=#000000] #[fg=#81A1C1,bg=#000000,bold]%H:%M "


set -ga terminal-overrides ",screen-256color*:Tc"
set-option -g default-terminal "screen-256color"
set -g focus-events on
#set -s escape-time 0

#unbind C-b
#set-option -g prefix C-a
#bind-key C-a send-prefix

bind r source-file ~/.tmux.conf
set -g base-index 1


# Bind prefix + f to launch the sessionizer in a new tmux window
bind-key -r s run-shell "tmux neww tmux-sessionizer"


# fzf shortcuts for piping file paths etc.
# Press prefix + f to search all files in the current repository/directory
bind f display-popup -E "PATH=\$PATH:/usr/bin:/usr/local/bin ~/.local/bin/tmux-file-picker"

# Press prefix + Ctrl + g to filter ONLY git-tracked/modified files (highly efficient for small context)
bind C-g display-popup -E "PATH=\$PATH:/usr/bin:/usr/local/bin ~/.local/bin/tmux-file-picker --git-status"

# Press prefix + Ctrl + r to filter directories instead of individual files
bind C-r display-popup -E "PATH=\$PATH:/usr/bin:/usr/local/bin ~/.local/bin/tmux-file-picker -d"

